<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản - GameNick Store</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <header>
    <div class="header-container">
      <a href="/index.html" class="logo">
        🎮 <span class="logo-accent">GameNick</span>Store
      </a>
      <div id="user-actions" class="header-actions"></div>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card glass" style="max-width: 500px;">
      <div class="auth-header">
        <h2 class="glow-text-cyan">Đăng Ký</h2>
        <p>Tạo tài khoản để tham gia mua sắm và nhận ưu đãi</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Họ và tên</label>
          <input type="text" id="fullName" class="form-control" required placeholder="Ví dụ: Nguyễn Văn A">
        </div>
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" class="form-control" required placeholder="Tên tài khoản viết liền không dấu">
        </div>
        <div class="form-group">
          <label for="email">Địa chỉ Email</label>
          <input type="email" id="email" class="form-control" required placeholder="nhapemail@gamenick.com">
        </div>
        <div class="form-group">
          <label for="phone">Số điện thoại</label>
          <input type="tel" id="phone" class="form-control" required pattern="^0\d{8,10}$" placeholder="Ví dụ: 0987654321">
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" class="form-control" required placeholder="Mật khẩu của bạn">
        </div>
        <button type="submit" class="btn btn-cyan" style="width: 100%; margin-top: 15px; font-size: 1.05rem;">
          Đăng Ký
        </button>
      </form>

      <div class="auth-footer">
        <p>Đã có tài khoản? <a href="/login.html">Đăng nhập</a></p>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <p>&copy; 2026 GameNick Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/toast.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
