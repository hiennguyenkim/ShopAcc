<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu - GameNick Store</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <header>
    <div class="header-container">
      <a href="/index.html" class="logo">
        🎮 <span class="logo-accent">GameNick</span>Store
      </a>
      <div id="user-actions" class="header-actions"></div>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card glass">
      <div class="auth-header">
        <h2 class="glow-text-cyan">Khôi Phục Mật Khẩu</h2>
        <p>Nhập địa chỉ email của bạn để nhận mật khẩu tạm thời</p>
      </div>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email tài khoản</label>
          <input type="email" id="email" class="form-control" required placeholder="nhapemail@gamenick.com">
        </div>
        <button type="submit" class="btn btn-cyan" style="width: 100%; margin-top: 15px; font-size: 1.05rem;">
          Yêu cầu cấp lại mật khẩu
        </button>
      </form>

      <!-- Div to show output dynamic password -->
      <div id="forgot-password-result" class="glass" style="display: none; padding: 15px; margin-top: 20px; border-color: var(--accent-cyan); text-align: center;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">Mật khẩu tạm thời mới của bạn là:</p>
        <h3 id="temp-password-placeholder" class="glow-text-cyan" style="font-size: 1.5rem; margin: 10px 0; font-family: monospace;"></h3>
        <p style="font-size: 0.8rem; color: var(--warning);">Hãy sử dụng mật khẩu này để đăng nhập và đổi mật khẩu mới ngay!</p>
      </div>

      <div class="auth-footer">
        <p><a href="/login.html">Quay lại đăng nhập</a></p>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <p>&copy; 2026 GameNick Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/toast.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
