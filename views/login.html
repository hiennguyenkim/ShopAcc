<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - GameNick Store</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-container">
      <a href="/index.html" class="logo">
        🎮 <span class="logo-accent">GameNick</span>Store
      </a>
      <div id="user-actions" class="header-actions">
        <!-- populated dynamically -->
      </div>
    </div>
  </header>

  <!-- Login Area -->
  <div class="auth-wrapper">
    <div class="auth-card glass">
      <div class="auth-header">
        <h2 class="glow-text-cyan">Đăng Nhập</h2>
        <p>Chào mừng bạn quay trở lại với GameNick Store</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" class="form-control" required placeholder="Nhập tên đăng nhập của bạn">
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" class="form-control" required placeholder="Nhập mật khẩu">
        </div>
        <button type="submit" class="btn btn-cyan" style="width: 100%; margin-top: 15px; font-size: 1.05rem;">
          Đăng Nhập
        </button>
      </form>

      <div class="auth-footer">
        <p><a href="/forgot-password.html">Quên mật khẩu?</a></p>
        <p style="margin-top: 10px;">Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a></p>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <p>&copy; 2026 GameNick Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/toast.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
