<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bộ sưu tập Nick nổi bật - GameNick Store</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/products.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    .collection-header {
      padding: 40px;
      margin-bottom: 40px;
      text-align: center;
    }
    .collection-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-container">
      <a href="/index.html" class="logo">
        🎮 <span class="logo-accent">GameNick</span>Store
      </a>
      <nav>
        <ul>
          <li><a href="/index.html">Trang chủ</a></li>
          <li><a href="/products.html">Cửa hàng Nick</a></li>
          <li><a href="/collections.html" class="glow-text-cyan">Bộ sưu tập</a></li>
          <li><a href="/order-tracking.html">Tra cứu đơn</a></li>
          <li><a href="/contact.html">Liên hệ</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="cart-icon-btn" onclick="window.location.href='/cart.html'">
          🛒 <span id="cart-badge" class="cart-badge">0</span>
        </button>
        <div id="user-actions" style="display: flex; gap: 10px;"></div>
      </div>
    </div>
  </header>

  <!-- Collections Listings -->
  <div class="products-layout" style="grid-template-columns: 1fr; max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    <div id="collections-list-container">
      <!-- loaded dynamically -->
    </div>
  </div>

  <footer>
    <div class="footer-bottom">
      <p>&copy; 2026 GameNick Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/toast.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    let userWishlist = [];

    document.addEventListener('DOMContentLoaded', loadWishlistAndCollections);

    async function loadWishlist() {
      try {
        const res = await fetch('/api/wishlist');
        const data = await res.json();
        if (data.success && data.wishlist) {
          userWishlist = data.wishlist.map(w => w._id || w);
        }
      } catch (err) {}
    }

    async function handleBuyNow(accountId) {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (data.success && data.user) {
          window.location.href = `/checkout.html?accountId=${accountId}&mode=buynow`;
        } else {
          window.showToast('Vui lòng đăng nhập để mua tài khoản.', 'warning');
          setTimeout(() => {
            window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
          }, 1000);
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function handleWishlistToggle(accountId) {
      try {
        const res = await fetch('/api/auth/me');
        const data = await res.json();
        if (!data.success || !data.user) {
          window.showToast('Đăng nhập để lưu yêu thích.', 'warning');
          return;
        }

        const toggleRes = await fetch('/api/wishlist/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accountId })
        });
        const toggleData = await toggleRes.json();
        if (toggleData.success) {
          window.showToast(toggleData.message, 'success');
          if (toggleData.action === 'added') {
            userWishlist.push(accountId);
          } else {
            userWishlist = userWishlist.filter(id => id !== accountId);
          }
          const btn = document.querySelector(`.wishlist-btn[data-id="${accountId}"]`);
          if (btn) {
            btn.innerHTML = toggleData.action === 'added' ? '❤️' : '🤍';
          }
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadWishlistAndCollections() {
      await loadWishlist();
      
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const container = document.getElementById('collections-list-container');

      if (slug) {
        // Load single collection detail view
        container.innerHTML = '<h3 style="text-align: center; padding: 50px;">Đang tải bộ sưu tập...</h3>';
        try {
          const res = await fetch(`/api/collections/slug/${slug}`);
          const data = await res.json();
          if (data.success && data.collection) {
            const col = data.collection;
            container.innerHTML = `
              <a href="/collections.html" class="btn btn-outline" style="margin-bottom: 20px;">◀ Quay lại tất cả bộ sưu tập</a>
              <div class="collection-header glass" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url(${col.thumbnail || col.image || ''}); background-size: cover; background-position: center; padding: 40px; margin-bottom: 40px; text-align: center; border-radius: 12px;">
                <h2 class="collection-title" style="font-size: 2.2rem; font-weight: 800; color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0,240,255,0.5);">${col.name}</h2>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 10px;">${col.description || 'Các tài khoản nổi bật được chọn lựa kỹ càng.'}</p>
              </div>
              <div class="products-grid" id="collection-products-grid"></div>
            `;

            const grid = document.getElementById('collection-products-grid');
            const accounts = col.accounts || col.gameAccounts || [];
            
            if (accounts.length === 0) {
              grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 50px;">Hiện tại chưa có tài khoản game nào trong bộ sưu tập này.</p>';
            } else {
              accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'product-card';

                const gameTypeNames = {
                  lien_quan: 'Liên Quân',
                  free_fire: 'Free Fire',
                  fifa_mobile: 'FIFA Mobile',
                  lol: 'LMHT',
                  pubg: 'PUBG'
                };

                card.innerHTML = `
                  <div class="product-img-wrapper" style="position: relative;">
                    <img src="${acc.images[0] || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1470&auto=format&fit=crop'}" class="product-img" alt="${acc.name}" onclick="window.location.href='/product-detail.html?slug=${acc.slug}'" style="cursor: pointer;">
                    <span class="game-badge" style="z-index: 2;">${gameTypeNames[acc.gameType] || acc.gameType}</span>
                    <button class="wishlist-btn" data-id="${acc._id}" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; z-index: 2; transition: transform 0.2s;">
                      ${userWishlist.includes(acc._id) ? '❤️' : '🤍'}
                    </button>
                  </div>
                  <div class="product-info">
                    <span class="product-code">MS: ${acc.code}</span>
                    <h3 class="product-title" onclick="window.location.href='/product-detail.html?slug=${acc.slug}'" style="cursor: pointer;">${acc.name}</h3>
                    <div class="product-attributes">
                      <div class="attribute-item">🏆 Rank: ${acc.rank || 'N/A'}</div>
                      <div class="attribute-item">⭐ Level: ${acc.level || 'N/A'}</div>
                      <div class="attribute-item">🌐 SV: ${acc.server || 'Asia'}</div>
                      <div class="attribute-item">🛡️ BH: ${acc.warrantyDays || 0} ngày</div>
                    </div>
                    <div class="product-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                      <div class="product-price-section">
                        ${acc.oldPrice ? `<span class="old-price">${acc.oldPrice.toLocaleString('vi-VN')}đ</span>` : ''}
                        <span class="current-price">${acc.price.toLocaleString('vi-VN')}đ</span>
                      </div>
                      <div style="display: flex; gap: 5px;">
                        <button class="btn btn-outline btn-add-cart" style="padding: 6px 10px; font-size: 0.85rem;" title="Thêm vào giỏ">🛒</button>
                        <button class="btn btn-cyan btn-buy" style="padding: 6px 12px; font-size: 0.85rem;">Mua ngay</button>
                      </div>
                    </div>
                  </div>
                `;

                card.querySelector('.btn-buy').onclick = () => {
                  handleBuyNow(acc._id);
                };
                card.querySelector('.btn-add-cart').onclick = () => {
                  window.addToCart(acc);
                };
                card.querySelector('.wishlist-btn').onclick = (e) => {
                  e.stopPropagation();
                  handleWishlistToggle(acc._id);
                };

                grid.appendChild(card);
              });
            }
          } else {
            container.innerHTML = '<h3 style="text-align: center; color: var(--error); padding: 50px;">Không tìm thấy bộ sưu tập yêu cầu.</h3>';
          }
        } catch (err) {
          console.error(err);
          container.innerHTML = '<h3 style="text-align: center; color: var(--error); padding: 50px;">Lỗi tải dữ liệu.</h3>';
        }
      } else {
        // Load list of collections as cards in grid
        container.innerHTML = '<h3 style="text-align: center; padding: 50px;">Đang tải danh sách bộ sưu tập...</h3>';
        try {
          const res = await fetch('/api/collections');
          const data = await res.json();
          if (data.success && data.collections.length > 0) {
            container.innerHTML = `
              <h2 style="font-weight: 800; font-size: 2rem; color: var(--accent-cyan); margin-bottom: 30px; text-align: center;">Tất Cả Bộ Sưu Tập</h2>
              <div class="collections-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px;"></div>
            `;
            const grid = container.querySelector('.collections-grid');

            data.collections.forEach(col => {
              const card = document.createElement('div');
              card.className = 'glass';
              card.style.cssText = 'overflow: hidden; border-radius: 12px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;';
              card.onmouseenter = () => {
                card.style.transform = 'translateY(-5px)';
                card.style.boxShadow = 'var(--glow-cyan)';
              };
              card.onmouseleave = () => {
                card.style.transform = 'none';
                card.style.boxShadow = 'none';
              };
              card.onclick = () => {
                window.location.href = `?slug=${col.slug}`;
              };

              card.innerHTML = `
                <div style="height: 180px; background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url(${col.thumbnail || col.image || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1470&auto=format&fit=crop'}); background-size: cover; background-position: center; position: relative;">
                  <span class="game-badge" style="position: absolute; bottom: 15px; left: 15px; font-weight: bold; background: var(--accent-purple); color: white;">${col.accountCount || 0} nicks</span>
                </div>
                <div style="padding: 20px;">
                  <h3 style="font-size: 1.25rem; font-weight: 700; color: white; margin-bottom: 10px;">${col.name}</h3>
                  <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${col.description || 'Các tài khoản nổi bật được chọn lựa kỹ càng.'}</p>
                </div>
              `;
              grid.appendChild(card);
            });
          } else {
            container.innerHTML = '<p style="text-align: center; padding: 50px; color: var(--text-muted);">Hiện tại chưa có bộ sưu tập nào.</p>';
          }
        } catch (err) {
          console.error(err);
          container.innerHTML = '<h3 style="text-align: center; color: var(--error); padding: 50px;">Lỗi tải danh sách bộ sưu tập.</h3>';
        }
      }
    }
  </script>
</body>
</html>
